name: CI - Run Tests & Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/cache@v3
      with:
        path: |
          Library
          obj
        key: ${{ runner.os }}-Library-${{ hashFiles('**/packages-lock.json') }}
    
    - uses: game-ci/unity-test-runner@v4
      env:
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      with:
        projectPath: ./
        unityVersion: 6000.3.10f1
        testMode: editmode
        artifactsPath: test-results
        coverageOptions: generateAdditionalReports;generateHtmlReport;generateXmlReport
        customParameters: -nographics -enableCodeCoverage
    
    - uses: actions/upload-artifact@v3
      if: always()
      with:
        name: Test Results
        path: test-results
        retention-days: 7

